# Render Blueprint - S.A.M (Stratejik Analiz Merkezi)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sam-api
    runtime: python
    region: frankfurt  # EU region for Turkey
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false  # User must set this manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: sam-db
          property: connectionString
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: sam-db
    databaseName: sam
    user: sam
    region: frankfurt
    plan: free
